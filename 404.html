<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="San Pablo Vet Clínic - Clínica veterinaria en Rancagua. Urgencias 24 horas, especialistas en neurología, medicina felina y endocrinología. Atención a domicilio." />
    <meta name="theme-color" content="#00B4B4" />
    <title>San Pablo Vet Clínic | Clínica Veterinaria Rancagua</title>
    <base href="/SPVetClinic/" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <!-- MudBlazor styles -->
    <link rel="stylesheet" href="_content/MudBlazor/MudBlazor.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SPVetClinic.styles.css" rel="stylesheet" />
    <script type="importmap">{
  "imports": {
    "./_framework/blazor.webassembly.js": "./_framework/blazor.webassembly.66stpp682q.js",
    "./_framework/dotnet.native.js": "./_framework/dotnet.native.o55fmtwhak.js",
    "./_framework/dotnet.js": "./_framework/dotnet.qkpuyv4fa3.js",
    "./_framework/dotnet.runtime.js": "./_framework/dotnet.runtime.o0qy896u8v.js"
  }
}</script>
</head>

<body>
    <div id="app">
        <div
            style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#E8F8F8,#fff);">
            <svg class="loading-progress" style="width:80px;height:80px;">
                <circle r="40%" cx="50%" cy="50%" style="fill:none;stroke:#E8F8F8;stroke-width:8px;" />
                <circle r="40%" cx="50%" cy="50%"
                    style="fill:none;stroke:#00B4B4;stroke-width:8px;stroke-dasharray:251;stroke-dashoffset:0;animation:spin 1.5s linear infinite;" />
            </svg>
            <p style="margin-top:1.5rem;color:#00B4B4;font-family:Inter,sans-serif;font-weight:500;">Cargando San Pablo
                Vet Clínic...</p>
        </div>
        <style>
            @keyframes spin {
                0% {
                    stroke-dashoffset: 251;
                }

                50% {
                    stroke-dashoffset: 63;
                }

                100% {
                    stroke-dashoffset: 251;
                }
            }
        </style>
    </div>

    <div id="blazor-error-ui" style="background:#E85A4F;color:white;padding:1rem;text-align:center;display:none;">
        Ha ocurrido un error inesperado.
        <a href="." class="reload" style="color:white;text-decoration:underline;margin-left:0.5rem;">Recargar</a>
        <span class="dismiss" style="margin-left:1rem;cursor:pointer;">✕</span>
    </div>

    <script>
        // Scroll Reveal Animations
        function initScrollAnimations() {
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.1
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, observerOptions);

            // Observe all reveal elements
            document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale').forEach(el => {
                observer.observe(el);
            });

            // Smooth scroll for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                    // Close mobile menu if open
                    const navLinks = document.getElementById('navLinks');
                    if (navLinks) navLinks.classList.remove('active');
                });
            });

            // Navbar scroll effect
            let lastScroll = 0;
            window.addEventListener('scroll', () => {
                const nav = document.querySelector('.topnav');
                if (nav) {
                    if (window.scrollY > 50) {
                        nav.classList.add('scrolled');
                    } else {
                        nav.classList.remove('scrolled');
                    }
                }
            });
        }

        // Mobile menu toggle
        function toggleMobileMenu() {
            const navLinks = document.getElementById('navLinks');
            if (navLinks) {
                navLinks.classList.toggle('active');
            }
        }
    </script>

    <script src="_framework/blazor.webassembly.66stpp682q.js"></script>
    <!-- MudBlazor JS (optional for some features) -->
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>

</html>
